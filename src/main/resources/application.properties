spring.application.name=tienda

#definimos el puerto para hacer la prueba en localhost

server.port=8080


#clase 2 

#para definir el formato de despliegue de fecha y hora del log en la computdora
loggin.pattern.dateformat=hh:mm

#para eliminar mensajes invasivos de spring
spring.main.banner-mode=off

#en desarrollo el"cache" del servidor(false), en produccion "true"
spring.thymeleaf.cache=false

#clase 3
#Conexión local a la BD Techshop en MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/techshop
#conecxion a la base de datos

 
#Usuario y clave de creaTablas.sql
#spring.datasource.username=avnadmin
#spring.datasource.password=AVNS_jxrc62guNuPvPatG4ie
spring.datasource.username=root
spring.datasource.password=root
 
#Driver y plataforma de comunicación
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
 
#mostrar información en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE